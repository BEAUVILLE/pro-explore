ase())>-1&&out.indexOf(k)<0)out.push(k)})});return out}function boot(){var v=V();$('doctrine').textContent=v.doctrine||'EXPLORE prépare le lieu. PAY garde seulement le boost réel.';if(v.examples&&v.examples[0])$('txt').value=v.examples[0]}function prepare(){var v=V(),raw=$('txt').value.trim(),intents=match(raw,v.intents),fields=match(raw,v.fields);var msg=[(v.label||'EXPLORE')+' — brouillon préparé','Texte : '+raw,'Intentions : '+(intents.join(', ')||'à vérifier'),'Champs métier : '+(fields.join(', ')||'à compléter'),'','Doctrine : '+(v.doctrine||''),'Validation humaine obligatoire. Rien n’est publié ni encaissé automatiquement.'].join('\n');$('msg').textContent=msg;try{localStorage.setItem('DIGIY_EXPLORE_GO_LATEST',JSON.stringify({raw:raw,intents:intents,fields:fields,preparedAt:new Date().toISOString()}))}catch(e){}$('status').textContent='Brouillon EXPLORE préparé avec vocabulaire métier.';toast('Brouillon EXPLORE prêt')}$('prep').onclick=prepare;$('copy').onclick=function(){prepare();navigator.clipboard&&navigator.clipboard.writeText($('msg').textContent)};$('listen').onclick=function(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Micro non disponible');return}var r=new SR();r.lang='fr-FR';r.onresult=function(e){$('txt').value=e.results[0][0].transcript;prepare()};r.start();toast('Micro ouvert')};boot();})();</script></body></html>
