<!-- 2) CSS à coller avant </style> -->
<style>
.exploreActionPanel{
  margin-bottom:16px;
  border-color:rgba(212,175,55,.18);
  background:
    radial-gradient(800px 320px at 100% 0%, rgba(212,175,55,.10), transparent 55%),
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
}

.exploreActionHead{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.exploreActionBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid rgba(212,175,55,.26);
  background:rgba(212,175,55,.10);
  color:var(--gold2);
  font-size:12px;
  font-weight:1000;
  white-space:nowrap;
}

#digiyExploreCamembert{
  position:fixed;
  left:14px;
  bottom:calc(86px + env(safe-area-inset-bottom,0px));
  width:84px;
  height:84px;
  z-index:99999;
  font-family:Outfit, Inter, system-ui, sans-serif;
}

#digiyExploreCamembert .digiyExploreCenter{
  position:absolute;
  inset:0;
  width:84px;
  height:84px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  color:#fff;
  box-shadow:0 18px 40px rgba(0,0,0,.34);
  background:
    radial-gradient(circle at center, rgba(6,19,15,.95) 0 42%, transparent 43%),
    conic-gradient(
      from -90deg,
      rgba(212,175,55,.96) 0 33%,
      rgba(34,197,94,.90) 33% 66%,
      rgba(56,189,248,.88) 66% 100%
    );
  overflow:hidden;
}

#digiyExploreCamembert .digiyExploreCenter::before{
  content:"";
  position:absolute;
  inset:13px;
  border-radius:50%;
  background:rgba(6,19,15,.97);
  border:1px solid rgba(255,255,255,.10);
}

#digiyExploreCamembert .digiyExploreCenter span,
#digiyExploreCamembert .digiyExploreCenter strong{
  position:relative;
  z-index:2;
  display:block;
  text-align:center;
}

#digiyExploreCamembert .digiyExploreCenter span{
  font-size:20px;
  line-height:1;
  margin-bottom:2px;
}

#digiyExploreCamembert .digiyExploreCenter strong{
  font-size:11px;
  font-weight:1000;
}

#digiyExploreCamembert.playing .digiyExploreCenter{
  background:
    radial-gradient(circle at center, rgba(6,19,15,.95) 0 42%, transparent 43%),
    conic-gradient(
      from -90deg,
      rgba(248,113,113,.96) 0 50%,
      rgba(212,175,55,.90) 50% 100%
    );
}

#digiyExploreCamembert .digiyExploreMenu{
  position:absolute;
  left:94px;
  bottom:4px;
  width:228px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(6,19,15,.94);
  box-shadow:0 18px 48px rgba(0,0,0,.32);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  opacity:0;
  transform:translateX(-8px) scale(.96);
  pointer-events:none;
  transition:.18s ease;
}

#digiyExploreCamembert.open .digiyExploreMenu{
  opacity:1;
  transform:translateX(0) scale(1);
  pointer-events:auto;
}

#digiyExploreCamembert .digiyExploreMenu button{
  min-height:44px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,.07);
  color:#f7fbf8;
  padding:9px 10px;
  font-size:12px;
  font-weight:1000;
  cursor:pointer;
}

#digiyExploreCamembert .digiyExploreMenu .gold{
  background:linear-gradient(135deg,#d4af37,#f3d46b);
  color:#13200d;
}

#digiyExploreCamembert .digiyExploreMenu .green{
  background:rgba(34,197,94,.16);
  color:#dffcea;
  border:1px solid rgba(34,197,94,.25);
}

#digiyExploreCamembert .digiyExploreMenu .blue{
  background:rgba(56,189,248,.14);
  color:#d9f4ff;
  border:1px solid rgba(56,189,248,.24);
}

@media (max-width:640px){
  #digiyExploreCamembert{
    left:10px;
    bottom:calc(84px + env(safe-area-inset-bottom,0px));
    width:76px;
    height:76px;
  }

  #digiyExploreCamembert .digiyExploreCenter{
    width:76px;
    height:76px;
  }

  #digiyExploreCamembert .digiyExploreCenter::before{
    inset:12px;
  }

  #digiyExploreCamembert .digiyExploreMenu{
    left:0;
    bottom:86px;
    width:min(260px, calc(100vw - 20px));
  }
}
</style>

<!-- 4) À placer avant </body> -->
<div id="digiyExploreCamembert" aria-label="Guide vocal DIGIY EXPLORE">
  <button class="digiyExploreCenter" id="digiyExploreCenter" type="button" aria-expanded="false" aria-pressed="false">
    <span>🎧</span>
    <strong>DIGIY</strong>
  </button>

  <div class="digiyExploreMenu" id="digiyExploreMenu">
    <button class="gold" id="digiyExploreListen" type="button">Écouter</button>
    <button id="digiyExploreClose" type="button">Fermer</button>
    <button class="green" id="digiyExplorePlaces" type="button">Mes lieux</button>
    <button class="blue" id="digiyExploreAdd" type="button">Ajouter</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const root = document.getElementById("digiyExploreCamembert");
    const center = document.getElementById("digiyExploreCenter");
    const listen = document.getElementById("digiyExploreListen");
    const close = document.getElementById("digiyExploreClose");
    const places = document.getElementById("digiyExplorePlaces");
    const add = document.getElementById("digiyExploreAdd");

    const AUDIO_TEXT =
      "Bienvenue dans ta gestion EXPLORE by DIGIY. Ici, tu ne dois pas tout lire ni tout porter dans ta tête. DIGIY regarde derrière et te montre seulement la prochaine action utile. Mes lieux te montre ce qui existe. Ajouter te permet de poser un nouveau lieu. Les notes gardent une trace rapide. Le cockpit reste simple : regarder, comprendre, cliquer. Le terrain garde son âme, toi tu gardes la main.";

    let playing = false;

    function setOpen(open){
      if(!root || !center) return;
      root.classList.toggle("open", !!open);
      center.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function setPlaying(state){
      playing = !!state;
      if(!root || !center) return;
      root.classList.toggle("playing", playing);
      center.setAttribute("aria-pressed", playing ? "true" : "false");
      center.innerHTML = playing
        ? "<span>⏹</span><strong>Stop</strong>"
        : "<span>🎧</span><strong>DIGIY</strong>";
    }

    function getVoice(){
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      return voices.find(v => /^fr/i.test(v.lang || "")) || null;
    }

    function stop(){
      try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(_){}
      setPlaying(false);
    }

    function speak(){
      if(!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)){
        alert("Audio indisponible sur ce navigateur.");
        return;
      }

      if(playing){
        stop();
        return;
      }

      stop();

      const utter = new SpeechSynthesisUtterance(AUDIO_TEXT);
      utter.lang = "fr-FR";
      utter.rate = 0.86;
      utter.pitch = 1.04;
      utter.volume = 1;

      const voice = getVoice();
      if(voice) utter.voice = voice;

      utter.onstart = () => setPlaying(true);
      utter.onend = () => setTimeout(stop, 120);
      utter.onerror = stop;

      window.speechSynthesis.speak(utter);
    }

    center && center.addEventListener("click", function(){
      setOpen(!root.classList.contains("open"));
    });

    listen && listen.addEventListener("click", speak);

    close && close.addEventListener("click", function(){
      stop();
      setOpen(false);
    });

    places && places.addEventListener("click", function(){
      location.href = "./lieux.html";
    });

    add && add.addEventListener("click", function(){
      location.href = "./submit.html";
    });

    document.addEventListener("click", function(e){
      if(root && !root.contains(e.target)){
        setOpen(false);
      }
    });

    if(window.speechSynthesis && typeof window.speechSynthesis.onvoiceschanged !== "undefined"){
      window.speechSynthesis.onvoiceschanged = getVoice;
    }

    window.addEventListener("beforeunload", stop);
    document.addEventListener("visibilitychange", function(){
      if(document.hidden) stop();
    });
  })();
</script>
