<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EXPLORE vers PAY</title><meta name="robots" content="noindex,nofollow"><style>body{margin:0;min-height:100vh;font-family:system-ui;background:#06130f;color:white;padding:18px;display:grid;place-items:center;font-weight:900}.card{width:min(680px,100%);border:1px solid rgba(255,255,255,.2);border-radius:28px;background:rgba(255,255,255,.09);padding:20px}.k{color:#f3d46b;font-size:12px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase}h1{font-size:clamp(42px,12vw,70px);line-height:.9;margin:10px 0;font-weight:1000}p{line-height:1.4;color:rgba(255,255,255,.85)}textarea,input{width:100%;border-radius:18px;border:1px solid rgba(212,175,55,.38);background:#06130f;color:white;padding:13px;font:900 16px system-ui;margin-top:10px}label{display:block;margin-top:10px;color:#f3d46b;font-weight:1000}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.btn,a.btn{min-height:56px;border-radius:18px;border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;background:rgba(255,255,255,.1);color:white;text-decoration:none;font-weight:1000;margin-top:10px}.go{background:#d4af37;color:#06130f}.gold{background:#f3d46b;color:#111}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><main class="card"><div class="k">EXPLORE → PAY</div><h1>Boost réel.</h1><p>EXPLORE garde le lieu, la fiche, le QR et la visibilité. PAY garde seulement boost, abonnement ou argent réellement reçu.</p><label>Montant reçu</label><input id="amount" inputmode="numeric" value="10000"><label>Mode</label><input id="mode" value="Wave"><label>Lieu / visibilité</label><input id="place" value="Boost visibilité EXPLORE"><label>Phrase PAY</label><textarea id="phrase">boost EXPLORE 10000 Wave</textarea><div class="grid"><button class="btn gold" id="copy" type="button">Copier phrase PAY</button><a class="btn go" href="https://pro-pay.digiylyfe.com/action.html">Ouvrir PAY</a></div><a class="btn" href="./action.html">Retour DIGIY GO EXPLORE</a><p>Validation humaine obligatoire dans PAY. Rien n'est confirme automatiquement.</p></main><script>(function(){function $(id){return document.getElementById(id)}function clean(n){return String(n||'').replace(/[^0-9]/g,'')||'0'}function load(){try{var d=JSON.parse(localStorage.getItem('DIGIY_EXPLORE_GO_LATEST')||'null');if(!d)return;if(d.amount)$('amount').value=d.amount;if(d.mode)$('mode').value=d.mode;if(d.place)$('place').value=d.place}catch(e){}}function refresh(){var a=clean($('amount').value),m=$('mode').value||'Cash',p=$('place').value||'Boost EXPLORE';$('phrase').value='boost EXPLORE '+a+' '+m+' - '+p}['amount','mode','place'].forEach(function(id){$(id).addEventListener('input',refresh)});$('copy').onclick=function(){refresh();if(navigator.clipboard)navigator.clipboard.writeText($('phrase').value)};load();refresh();})();</script></body></html>
