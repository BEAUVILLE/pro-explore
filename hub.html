  <style>
    :root{
      color-scheme:dark;
      --bg:#06130f;
      --bg2:#0a1f18;
      --card:rgba(255,255,255,.075);
      --line:rgba(255,255,255,.15);
      --text:#f8fafc;
      --muted:rgba(248,250,252,.70);
      --gold:#d4af37;
      --gold2:#f3d46b;
      --green:#22c55e;
      --shadow:0 26px 76px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:22px;
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(760px 440px at 8% -10%,rgba(212,175,55,.19),transparent 60%),

    }

    main{
      width:min(480px,100%);
      padding:24px;
      border:1px solid var(--line);
      border-radius:28px;
      background:var(--card);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    h1{
      margin:0 0 22px;
      color:var(--gold2);
      font-size:clamp(2rem,9vw,3rem);
      line-height:1.02;
      letter-spacing:-.045em;
    }

    nav{display:grid;gap:12px}

    a,button{
      width:100%;
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      color:var(--text);
      background:rgba(255,255,255,.08);
      font:inherit;
      font-size:1rem;
      font-weight:950;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      transition:transform .14s ease,background .14s ease,border-color .14s ease;
    }

    a:first-child{
      color:#052215;
      border-color:transparent;
      background:linear-gradient(135deg,var(--green),#bbf7d0);
    }

    a:nth-child(3){
      color:#211904;
      border-color:transparent;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
    }

    a:hover,button:hover{
      transform:translateY(-1px);
      border-color:rgba(243,212,107,.42);
      background:rgba(255,255,255,.13);
    }

    a:active,button:active{transform:none}

<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./guard.js?v=explore-simple-hub-20260716"></script>

  <main>
    <h1>Bonjour.</h1>

    <nav aria-label="Actions EXPLORE PRO">
      <a href="./atelier.html">Mon lieu</a>
      <a href="./fiche.html">Ma fiche lieu</a>
      <a href="./qr.html">Mon QR</a>
      <button id="shareWhatsApp" type="button">Partager sur WhatsApp</button>
    </nav>

    <p id="status" role="status" aria-live="polite" hidden></p>
  </main>

  <script>
    (() => {
      "use strict";

      const shareButton=document.getElementById("shareWhatsApp");
      const statusBox=document.getElementById("status");
      const PUBLIC_BASE="https://explore.digiylyfe.com/";

      const SESSION_KEYS=[
        "digiy_explore_session",
        "digiy_explore_guard_session",
        "digiy_guard_explore_session",
        "DIGIY_EXPLORE_SESSION",
        "DIGIY_EXPLORE_ACCESS"
      ];

      const SLUG_KEYS=[
        "digiy_explore_last_slug",
        "digiy_explore_slug",
        "digiy_last_slug",
        "DIGIY_SLUG",
        "digiy_slug"
      ];

      function setStatus(message){
        statusBox.textContent=message||"";
        statusBox.hidden=!message;
      }

      function get(storage,key){
        try{return storage.getItem(key)||""}catch(_){return ""}
      }

      function json(raw){
        try{return JSON.parse(raw||"null")}catch(_){return null}
      }

      function slug(value){
        return String(value||"")
          .trim()
          .toLowerCase()
          .replace(/\s+/g,"-")
          .replace(/[^a-z0-9-]/g,"")
          .replace(/-+/g,"-")
          .replace(/^-|-$/g,"");
      }

      function cleanUrl(value){
        const raw=String(value||"").trim();
        if(!raw)return "";
        try{
          const url=new URL(raw);
          return url.protocol==="https:" ? url.toString() : "";
        }catch(_){return ""}
      }

      function internalSlug(){
        for(const storage of [localStorage,sessionStorage]){
          for(const key of SESSION_KEYS){
            const session=json(get(storage,key));
            const value=slug(session?.slug||session?.pro_slug||session?.explore_slug||"");
            if(value)return value;
          }
          for(const key of SLUG_KEYS){
            const value=slug(get(storage,key));
            if(value)return value;
          }
        }
        return "";
      }

      function savedFiche(){
        const proSlug=internalSlug();
        if(!proSlug)return null;
        try{return json(localStorage.getItem("DIGIY_EXPLORE_FICHE_V2_"+proSlug))}catch(_){return null}
      }

      function resolvePublicUrl(){
        const direct=cleanUrl(get(localStorage,"digiy_explore_public_url"));
        if(direct)return direct;

        const fiche=savedFiche()||{};
        const ficheUrl=cleanUrl(fiche.publicUrl||fiche.public_url||"");
        if(ficheUrl)return ficheUrl;

        const publicSlug=slug(
          get(localStorage,"digiy_explore_public_slug") ||
          fiche.publicSlug ||
          fiche.public_slug ||
          ""
        );

        if(publicSlug){
          const url=new URL(PUBLIC_BASE);
          url.searchParams.set("slug",publicSlug);
          return url.toString();
        }

        return "";
      }

      shareButton.addEventListener("click",()=>{
        const publicUrl=resolvePublicUrl();
        if(!publicUrl){
          setStatus("Prépare d’abord ta fiche lieu et son slug public.");
          return;
        }
        const message="Bonjour, voici mon lieu sur DIGIY EXPLORE : "+publicUrl;
        setStatus("Ouverture de WhatsApp…");
        location.href="https://wa.me/?text="+encodeURIComponent(message);
      });
    })();
  </script>
