<body>
  <main class="card">
    <div class="k">DIGIYLYFE · EXPLORE sécurisé</div>

      Si la session est encore valide, EXPLORE ouvre le HUB.
      Sinon, retour au PIN.
    </p>

      <a href="./hub.html">🧭 HUB si session ouverte</a>
    </div>

    <div class="small" id="status">Contrôle de la session locale…</div>
  </main>

  <script>
    (function(){
      "use strict";

      const HUB = "./hub.html";
      const PIN = "./pin.html";
      const MAX_WAIT_MS = 1800;

      function cleanUrl(){
        try{
          const url = new URL(window.location.href);
          [
            "slug",
            "phone",
            "tel",
            "owner_phone",
            "owner_id",
            "business_code",
            "access_note",
            "keybox_code",
            "keybox_location",
            "pin",
            "token",
            "session_token",
            "return",
            "from",
            "redirect",
            "redirect_url",
            "url",
            "v"
          ].forEach(function(key){
            url.searchParams.delete(key);
          });

          history.replaceState({}, document.title, url.pathname + url.search + url.hash);
        }catch(_){}
      }

      function setStatus(text){
        const el = document.getElementById("status");
        if(el) el.textContent = text;
      }

      function isOkState(state){
        return !!(
          state &&
          (
            state.access_ok === true ||
            state.access === true ||
            state.ok === true ||
            state.pin_session_ok === true
          ) &&
          (
            state.slug ||
            state.phone ||
            state.preview === false
          )
        );
      }

      function fallbackHasFreshSession(){
        const keys = [
          "DIGIY_EXPLORE_PIN_SESSION",
          "DIGIY_EXPLORE_SESSION",
          "DIGIY_SESSION_EXPLORE",
          "DIGIY_EXPLORE_ACCESS",
          "digiy_explore_session",
          "DIGIY_ACCESS"
        ];

        for(const key of keys){
          try{
            const raw = sessionStorage.getItem(key) || localStorage.getItem(key);
            if(!raw) continue;

            const s = JSON.parse(raw);
            const expires = Number(s.expires_at || s.expiresAt || 0);
            const ok =
              s.access === true ||
              s.access_ok === true ||
              s.ok === true ||
              s.pin_session_ok === true;

            if(ok && expires && expires > Date.now()){
              return true;
            }

            const ts = Number(s.verified_at || s.validated_at_ms || s.ts || 0);
            if(ok && ts && (Date.now() - ts) <= 8 * 60 * 60 * 1000){
              return true;
            }
          }catch(_){}
        }

        return false;
      }

      function go(target){
        window.location.replace(target);
      }

      async function boot(){
        cleanUrl();

        try{
          if(window.DIGIY_GUARD && typeof window.DIGIY_GUARD.ready === "function"){
            setStatus("Lecture du guard EXPLORE…");
            const state = await window.DIGIY_GUARD.ready({redirect:false,preserve_validation:true});

            if(isOkState(state)){
              setStatus("Session valide. Ouverture du HUB…");
              setTimeout(function(){ go(HUB); }, 350);
              return;
            }

            setStatus("Session absente ou expirée. Retour PIN…");
            setTimeout(function(){ go(PIN); }, 500);
            return;
          }
        }catch(e){
          setStatus("Guard fragile. Vérification locale de secours…");
        }

        if(fallbackHasFreshSession()){
          setStatus("Session locale trouvée. Ouverture du HUB…");
          setTimeout(function(){ go(HUB); }, 350);
        }else{
          setStatus("Session non validée. Retour PIN…");
          setTimeout(function(){ go(PIN); }, 500);
        }
      }

      setTimeout(function(){
        const current = document.getElementById("status")?.textContent || "";
        if(current.includes("Contrôle") && !window.DIGIY_GUARD){
          if(fallbackHasFreshSession()) go(HUB);
          else go(PIN);
        }
      }, MAX_WAIT_MS);

      boot();
    })();
  </script>
</body>
