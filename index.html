  <meta name="description" content="Porte sécurisée EXPLORE PRO : session PIN valide vers HUB, sinon retour PIN. Aucun téléphone visible dans l’adresse."/>

  <script>
    /*
      Nettoyage immédiat AVANT guard.js.
      Si un ancien lien arrive avec téléphone / slug / token, on enlève tout de la barre visible.
      Le téléphone ne doit jamais rester apparent.
    */
    (function(){
      "use strict";
      try{
        const url = new URL(window.location.href);
        [
          "slug",
          "phone",
          "tel",
          "owner_phone",
          "owner_id",
          "business_code",
          "access_note",
          "keybox_code",
          "keybox_location",
          "pin",
          "code",
          "token",
          "session",
          "session_token",
          "return",
          "from",
          "redirect",
          "redirect_url",
          "url",
          "v"
        ].forEach(function(key){
          url.searchParams.delete(key);
        });
        history.replaceState({}, document.title, url.pathname + url.search + url.hash);
      }catch(_){}
    })();

    window.DIGIY_SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON = window.DIGIY_SUPABASE_ANON_KEY;

    window.DIGIY_MODULE = "EXPLORE";
    window.DIGIY_ABOS_MODULE = "EXPLORE_BOOST";
    window.DIGIY_LOGIN_URL = "./pin.html";
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    body{
      min-height:100vh;
      display:grid;

      width:min(520px,100%);

<body>
  <main class="card">
    <div class="k">DIGIYLYFE · EXPLORE sécurisé</div>
    <h1>Vérification PIN…</h1>
    <p>
      Si la session PIN est valide, EXPLORE ouvre le HUB.
      Sinon, retour au PIN. Aucun téléphone ne reste visible.
    </p>

    <div class="actions">
      <a href="./pin.html">🔐 Entrer par PIN</a>
    </div>

    <div class="small" id="status">Contrôle de la session locale…</div>
  </main>

  <script>
    (function(){
      "use strict";

      const HUB = "./hub.html";
      const PIN = "./pin.html";
      const MAX_WAIT_MS = 1800;

      function setStatus(text){
        const el = document.getElementById("status");
        if(el) el.textContent = text;
      }

      function isOkState(state){
        return !!(
          state &&
          (
            state.access_ok === true ||
            state.access === true ||
            state.ok === true ||
            state.pin_session_ok === true
          ) &&
          state.preview !== true
        );
      }

      function fallbackHasFreshSession(){
        const keys = [
          "DIGIY_EXPLORE_PIN_SESSION",
          "DIGIY_EXPLORE_SESSION",
          "DIGIY_SESSION_EXPLORE",
          "DIGIY_EXPLORE_ACCESS",
          "digiy_explore_session",
          "DIGIY_ACCESS"
        ];

        for(const key of keys){
          try{
            const raw = sessionStorage.getItem(key) || localStorage.getItem(key);
            if(!raw) continue;

            const s = JSON.parse(raw);
            const ok =
              s.access === true ||
              s.access_ok === true ||
              s.ok === true ||
              s.pin_session_ok === true ||
              s.preview === false;

            const sameModule =
              !s.module ||
              String(s.module).toUpperCase() === "EXPLORE" ||
              String(s.module).toUpperCase() === "EXPLORE_BOOST";

            if(!ok || !sameModule) continue;

            const expires = Number(s.expires_at || s.expiresAt || 0);
            if(expires && expires > Date.now()) return true;

            const ts = Number(s.verified_at || s.validated_at_ms || s.ts || 0);
            if(ts && (Date.now() - ts) <= 8 * 60 * 60 * 1000) return true;
          }catch(_){}
        }

        return false;
      }

      function go(target){
        window.location.replace(target);
      }

      async function boot(){
        try{
          if(window.DIGIY_GUARD && typeof window.DIGIY_GUARD.ready === "function"){
            setStatus("Lecture du guard EXPLORE…");
            const state = await window.DIGIY_GUARD.ready({redirect:false,preserve_validation:true});

            if(isOkState(state)){
              setStatus("Session valide. Ouverture du HUB…");
              setTimeout(function(){ go(HUB); }, 350);
              return;
            }

            setStatus("Session absente ou expirée. Retour PIN…");
            setTimeout(function(){ go(PIN); }, 500);
            return;
          }
        }catch(e){
          setStatus("Guard fragile. Vérification locale de secours…");
        }

        if(fallbackHasFreshSession()){
          setStatus("Session locale valide. Ouverture du HUB…");
          setTimeout(function(){ go(HUB); }, 350);
        }else{
          setStatus("Session non validée. Retour PIN…");
          setTimeout(function(){ go(PIN); }, 500);
        }
      }

      setTimeout(function(){
        const current = document.getElementById("status")?.textContent || "";
        if(current.includes("Contrôle") && !window.DIGIY_GUARD){
          if(fallbackHasFreshSession()) go(HUB);
          else go(PIN);
        }
      }, MAX_WAIT_MS);

      boot();
    })();
  </script>
</body>
